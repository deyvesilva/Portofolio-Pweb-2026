<!-- templates/escola/alunos.html -->    

{% extends "escola/base.html" %}
    
{% block content %}
<h2>Alunos</h2>

<section>
    {% for aluno in alunos %}
    <article>
        <header>
            <h3>{{ aluno }}</h3>
        </header>

        <section>
            <h4>Cursos</h4>
            <ul>
                {% for curso in aluno.cursos.all %}
                    <li>
                       <a href="{% url 'curso_detalhe' curso.id %}">{{ curso.nome }}</a>
                        </a>
                    </li>
               {% endfor %}
            </ul>
        </section>
    </article>
    {% endfor %}
</section>
{% endblock %}
