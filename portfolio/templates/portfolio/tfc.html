{% extends "portfolio/base.html" %}

{% block content %}
<div style="max-width: 900px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <h1 style="margin: 0; color: #2d3748;">🎓 Trabalho de Fim de Curso</h1>
        
    </div>

    {% for tfc in tfcs %}
    <div class="card" style="border-left: 8px solid #a80f96; padding: 30px; position: relative;">
        <div style="position: absolute; top: 15px; right: 15px; display: flex; gap: 10px;">
        
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; margin-right: 120px;">
            <h2 style="margin: 0; color: #2d3748;">{{ tfc.titulo }}</h2>
            <span style="background: #feebc8; color: #9c4221; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9em;">
                Ano: {{ tfc.ano }}
            </span>
        </div>

        <p style="text-align: justify; line-height: 1.8; color: #4a5568; font-size: 1.1em;">
            {{ tfc.descricao }}
        </p>

        </div>
    {% endfor %}
</div>
{% endblock %}
