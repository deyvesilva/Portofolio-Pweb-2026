{% extends "portfolio/base.html" %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 40px auto; padding: 25px;">
    <h2 style="text-align: center;">📝 Gerir Registo</h2>
    <hr>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="text-align: justify; margin: 20px 0;">
            {{ form.as_p }}
        </div>
        <div style="display: flex; gap: 10px;">
            <button type="submit" style="background: #48bb78; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Guardar</button>
            <a href="javascript:history.back()" style="background: #a0aec0; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
